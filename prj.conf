# ============================================================
# NES Emulator - lichee_zero (Allwinner V3s) 配置
# board defconfig 已提供: HEAP, SHELL, GPIO, CACHE, DISPLAY base
# ============================================================

# === 基础 ===
CONFIG_LOG=y
CONFIG_LOG_CMDS=y
CONFIG_LOG_BACKEND_UART=y
CONFIG_BOOT_BANNER=y
CONFIG_MAIN_STACK_SIZE=32768
CONFIG_MAIN_THREAD_PRIORITY=5

# === 调试: 故障转储 (FAULT_DUMP 是 int 类型: 0=禁用 1=基础 2=详细) ===
CONFIG_FAULT_DUMP=2

# === Shell (串口交互) ===
CONFIG_SHELL=y
CONFIG_SHELL_BACKEND_SERIAL=y
# CONFIG_SHELL_BACKEND_SSH is not set

# === 显示 + LVGL (与 hello_world 一致) ===
CONFIG_DISPLAY=y
CONFIG_LVGL=y
CONFIG_LV_Z_MEM_POOL_SIZE=524288
CONFIG_LV_Z_RUN_LVGL_ON_WORKQUEUE=y
CONFIG_LV_Z_FULL_REFRESH=y
CONFIG_LV_FONT_SOURCE_HAN_SANS_SC_14_CJK=y

# === 触摸屏输入 ===
CONFIG_INPUT=y
CONFIG_LV_Z_POINTER_INPUT=y

# === SD 卡 + 文件系统 (FatFS 只读挂载) ===
CONFIG_DISK_ACCESS=y
CONFIG_FILE_SYSTEM=y
CONFIG_FILE_SYSTEM_SHELL=y
CONFIG_FAT_FILESYSTEM_ELM=y
CONFIG_FS_FATFS_LFN=y
CONFIG_FS_FATFS_EXFAT=y
CONFIG_SDHC_SHELL=y

# === LVGL workqueue 栈增大 (默认 4096 太小, 渲染调用链深) ===
CONFIG_LV_Z_LVGL_WORKQUEUE_STACK_SIZE=16384

# === 动态内存 ===
# board defconfig 已设置 HEAP_MEM_POOL_SIZE=4121440 (4MB), 不在此覆盖
